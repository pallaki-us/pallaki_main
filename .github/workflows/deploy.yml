name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pallaki-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: pallaki-app

      - name: Build
        run: npm run build
        working-directory: pallaki-app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ENV: staging
          VITE_STORAGE_BUCKET: pallaki-media-staging

      - name: Add 404.html for SPA routing
        run: cp pallaki-app/dist/index.html pallaki-app/dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pallaki-app/dist

      - uses: actions/deploy-pages@v4
        id: deployment
