<!DOCTYPE html>
<html>
<script>
  var l = window.location;
  var segs = l.pathname.split('/').filter(Boolean);
  if (segs.length > 0) {
    var base = '/' + segs[0] + '/';
    var rest = l.pathname.slice(base.length);
    l.replace(l.protocol + '//' + l.host + base + '?p=' + encodeURIComponent('/' + rest) + l.hash);
  }
</script>
</html>
